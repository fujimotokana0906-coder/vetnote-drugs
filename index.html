{name:"トラマール（トラマドール）",gen:"トラマドール塩酸塩",cat:"NSAIDs",tags:["弱オピオイド","鎮痛"],scenes:["外来","入院"],action:"弱オピオイド受容体作動薬＋セロトニン・ノルアドレナリン再取り込み阻害。NSAIDsと組み合わせて使うことも多い。",disease:"中程度の疼痛、慢性疼痛（変形性関節症など）",dose:"PO",caution:"鎮静、嘔吐（特に犬）。猫では効果が不安定な場合あり。",dog:"◎",cat2:"△ 効果が不安定"},
{name:"プレドニゾロン（プレドニン）",gen:"プレドニゾロン",cat:"ステロイド",tags:["副腎皮質ホルモン"],scenes:["外来","入院"],action:"①抗炎症作用　②免疫抑制　③気道を広げやすくする。",disease:"皮膚炎・アレルギー、免疫疾患、呼吸器疾患、炎症全般、犬糸状虫性咳（犬）",dose:"5mg・20mg PO",caution:"★長期投与→肝数値上昇・感染症リスク増加・筋肉量低下・皮膚萎縮・糖尿病悪化。★急停止すると副腎不全の危険→漸減前提。他のNSAIDsと併用すると胃腸障害リスク増。多飲多尿・食欲増加・パンティング・体重増加に注意。",dog:"◎",cat2:"◎ 犬より高用量が必要なことも"},
{name:"デキサメタゾン",gen:"デキサメタゾン",cat:"ステロイド",tags:["副腎皮質ホルモン","緊急"],scenes:["緊急","入院"],action:"プレドニゾロンより強力な抗炎症・免疫抑制作用。",disease:"アナフィラキシーショック、重症炎症、脳浮腫",dose:"IV",caution:"鉱質コルチコイド作用が弱いため長期補充療法には不向き。急性使用での血糖上昇に注意。",dog:"◎ 緊急時",cat2:"◎ 緊急時"},
{name:"マロピタント（セレニア）",gen:"マロピタント",cat:"消化器",tags:["制吐剤","NK1受容体拮抗薬"],scenes:["外来","入院","手術"],action:"嘔吐中枢のNK1受容体をブロックして嘔吐指令そのものを遮断。原因を問わず吐き気を止める純粋な吐き気止め。",disease:"急性・慢性嘔吐、術後嘔吐予防、乗り物酔い（犬）",dose:"24mg・60mg OD錠 PO SID。★注射はかなり痛い（投与時に痛みを伴う）",caution:"嘔吐を止めるだけで原因治療をしていないため、続く場合は精査が必要。",dog:"◎",cat2:"◎"},
{name:"メトクロプラミド（テルペラン / プリンペラン）",gen:"メトクロプラミド",cat:"消化器",tags:["制吐・消化管運動促進"],scenes:["外来","入院"],action:"中枢：嘔吐中枢のドパミンD2受容体をブロック。末梢：胃・十二指腸の蠕動運動を促進（胃排出促進・小腸蠕動促進・制吐作用）。",disease:"急性・慢性胃炎、食欲不振と嘔吐、麻酔後の胃腸運動低下、腎不全・肝疾患での嘔吐対策",dose:"食前投与（胃の運動を促したい目的のため）",caution:"★向精神薬・ドパミン遮断薬→錐体外路症状（震え・興奮）のリスクあり。消化管穿孔・閉塞・てんかん既往がある患者。★猫では投与後30〜60分の行動変化に注意。",dog:"◎",cat2:"⚠ 行動変化に注意"},
{name:"プロナミド 5mg",gen:"メトクロプラミド（プロナミド）",cat:"消化器",tags:["制吐・消化管運動促進"],scenes:["外来","入院"],action:"テルペランと同成分。消化管運動促進＋制吐（中枢性＋末梢性）。",disease:"急性・慢性胃炎、麻酔後の胃腸運動低下、腎不全・肝疾患での嘔吐対策",dose:"食前投与",caution:"★消化管穿孔・閉塞・てんかん既往がある患者。★猫では投与後30〜60分の行動変化に注意。",dog:"◎",cat2:"⚠ 行動変化に注意"},
{name:"オンダンセトロン 4mg 8mg",gen:"オンダンセトロン",cat:"消化器",tags:["制吐剤","5-HT3拮抗薬"],scenes:["入院"],action:"セロトニン受容体（5-HT3）を阻害して制吐。",disease:"難治性嘔吐（マロピタントで効果不十分な場合）",dose:"PO / IV",caution:"",dog:"◎",cat2:"◎"},
{name:"アルサルミン（スクラルファート）",gen:"スクラルファート",cat:"消化器",tags:["消化管粘膜保護剤"],scenes:["外来"],action:"胃の中で酸性になりねばねばと変化して潰瘍や炎症部分に張り付き、胃酸・ペプシン・胆汁酸などの刺激から傷を守る。",disease:"胃炎、胃潰瘍、十二指腸潰瘍（嘔吐・食欲不振・吐血・黒色便の時）",dose:"基本的には空腹時。かなり苦味あり（分割は可能）。",caution:"他の薬を包み込んで吸収を邪魔することがある（特に抗生剤とは投与間隔をあける）。ガスター・オメプラゾールとの併用時は2時間以上間隔をあける。便秘や軽度の食欲低下。",dog:"◎",cat2:"◎"},
{name:"ファモチジン（ガスター）",gen:"ファモチジン",cat:"消化器",tags:["H2ブロッカー","胃酸分泌抑制"],scenes:["外来","入院"],action:"ヒスタミンH2受容体をブロックして胃酸の分泌を抑える（胃酸を出にくくする）。",disease:"胃炎、胃潰瘍、ステロイドやNSAIDs使用時の胃保護、尿毒症性胃炎",dose:"PO　食前・食後どちらでも可",caution:"長期連用で効果が減弱することがある（耐性）。アルサルミンと併用時は2時間以上間隔をあける。",dog:"◎",cat2:"◎"},
{name:"オメプラゾール",gen:"オメプラゾール",cat:"消化器",tags:["プロトンポンプ阻害薬","胃酸分泌抑制"],scenes:["外来","入院"],action:"プロトンポンプを阻害して胃酸をほぼ出せなくする。ガスターよりも強い胃酸分泌抑制。",disease:"胃潰瘍、十二指腸潰瘍、重度の胃炎、ガスターで効果不十分な時、ステロイド・NSAIDs長期使用時の胃保護",dose:"腸溶錠・カプセル（分割不可）。空腹時（食前30分〜1時間前）投与。",caution:"アルサルミンと併用時は2時間以上間隔をあける（オメプラゾールを先に飲ませる）。即効性は低いが続けることでしっかり効いてくる。",dog:"◎",cat2:"◎"},
{name:"ラベプラゾール",gen:"ラベプラゾール",cat:"消化器",tags:["プロトンポンプ阻害薬","胃酸分泌抑制"],scenes:["外来","入院"],action:"オメプラゾールと同じプロトンポンプ阻害。",disease:"胃潰瘍、重度の胃炎、胃保護",dose:"PO（分割不可）",caution:"アルサルミンと投与間隔をあける",dog:"◎",cat2:"◎"},
{name:"ガリプラント 20mg",gen:"ガラプラント / ロキベタピン",cat:"消化器",tags:["EP4受容体拮抗薬","制吐"],scenes:["外来"],action:"プロスタグランジンE2のEP4受容体を遮断して嘔吐を抑制。新しいタイプの制吐薬。",disease:"慢性嘔吐（慢性腸症など）",dose:"PO",caution:"",dog:"◎",cat2:""},
{name:"ディアバスター（硫酸ベルベリン）",gen:"硫酸ベルベリン",cat:"消化器",tags:["止瀉剤"],scenes:["外来"],action:"急性下痢に対して、抗炎症作用、ぜん動運動抑制作用、胆汁分泌作用、腸管内の病原菌の増殖抑制。",disease:"急性下痢",dose:"PO",caution:"",dog:"◎",cat2:"◎"},

{name:"ラクツロースシロップ",gen:"ラクツロース",cat:"消化器",tags:["緩下剤"],scenes:["外来","入院"],action:"腸内でガスを発生させ腸を動かし便を軟化。肝性脳症にも使用（アンモニア低下）。",disease:"便秘、肝性脳症",dose:"PO",caution:"",dog:"◎",cat2:"◎"},
{name:"サイトテック（ミソプロストール）",gen:"ミソプロストール",cat:"消化器",tags:["消化管粘膜保護","プロスタグランジン製剤"],scenes:["外来"],action:"胃粘膜のプロスタグランジン受容体に作用し胃粘膜を保護。",disease:"NSAIDs誘発性胃潰瘍の予防・治療",dose:"PO（食後）",caution:"下痢（副作用として多い）。★妊娠中は禁忌（子宮収縮作用あり）。",dog:"◎",cat2:"◎"},

{name:"フェンタニル",gen:"フェンタニル",cat:"オピオイド",tags:["強オピオイド","CRI"],scenes:["入院","手術"],action:"μ（ミュー）オピオイド受容体刺激。作用がとても速い（IV投与後1〜2分で効く）が持続時間は短い→CRI投与が基本。",disease:"強い痛みの管理、麻酔中の疼痛コントロール、術後鎮痛",dose:"CRI / パッチ製剤 / ボーラス投与",caution:"★呼吸抑制（呼吸数低下）、嘔吐、悪心、食欲低下、徐脈。HR・粘膜色・CRTなどの循環状態をモニタリング。鎮静レベルを確認（反応あるか、立てるか、過鎮静されてないか）。痛みが取れているか（パンティング・姿勢・落ち着き）を確認。CRIを急にやめると痛みが出ることがあるので術後は次の鎮痛薬へスムーズに切替が必要。評価の目安→震え・パンティング・落ち着かない・触ると怒る・食欲不振・活動性が低下したままの症状がなくなってきたら外すタイミング。",dog:"◎ 強い痛みのファースト",cat2:"◎"},
{name:"ブプレノルフィン（レペタン / ブレンダ）",gen:"ブプレノルフィン酸塩酸",cat:"オピオイド",tags:["中オピオイド"],scenes:["入院","手術"],action:"中オピオイド（部分作動薬）。モルヒネ系より鎮痛力は弱めだが呼吸抑制・循環抑制が少ない。",disease:"術後鎮痛、手術時の麻酔補助",dose:"IV / IM",caution:"天井効果あり（これ以上鎮痛が強くならない量がある）。痛みの程度によってはフェンタニルなどより強いオピオイドが使われる。",dog:"◎",cat2:"◎ 猫に使いやすい"},
{name:"ヒドロモルフォン",gen:"ヒドロモルフォン",cat:"オピオイド",tags:["強オピオイド"],scenes:["入院","手術"],action:"μオピオイド受容体刺激。強鎮痛・鎮静。術後も鎮痛が持続（約4〜6時間）。",disease:"強い痛み、鎮静、術中〜術後鎮静",dose:"IV",caution:"★術後も副作用に注意。作用が強すぎる時は拮抗薬のナロキソンを使うことがある。徐脈（迷走神経刺激による）。呼吸抑制。嘔吐（犬で比較的多い）、パンティング（特に犬）。",dog:"◎ 嘔吐注意",cat2:"◎"},
{name:"ブトルファノール",gen:"ブトルファノール",cat:"オピオイド",tags:["オピオイド鎮痛薬","前投与"],scenes:["手術"],action:"①鎮痛　②鎮静　③鎮咳。モルヒネ系より鎮痛力は弱めだが呼吸抑制・循環抑制が少ない。天井効果あり。",disease:"手術前投与、鎮痛・鎮静・鎮咳",dose:"IM / IV",caution:"メデトミジンやミダゾラムと併用することが多い。鎮痛レベルが弱いと体動や心拍数増加・血圧上昇が現れる。",dog:"◎",cat2:"◎ 興奮に注意"},
{name:"メデトミジン",gen:"メデトミジン",cat:"麻酔・鎮静",tags:["α2作動薬","前投与"],scenes:["手術"],action:"α2受容体を刺激→交感神経抑制→血管収縮→鎮静・心拍数低下・鎮痛。①鎮静　②鎮痛　③筋弛緩。",disease:"手術前投与、鎮静処置",dose:"IM / IV",caution:"★徐脈による循環低下。血圧変化（血管収縮作用により上昇した後低下）→心拍数は低いのに血圧は高い（他のモニターも合わせて評価する）。呼吸抑制（軽度）。",dog:"◎",cat2:"◎"},
{name:"プロポフォール",gen:"プロポフォール",cat:"麻酔・鎮静",tags:["麻酔導入薬"],scenes:["手術"],action:"①鎮静・麻酔　②筋弛緩　③抗けいれん。作用発現が早い（30〜60秒）、覚醒が早い。",disease:"麻酔導入",dose:"IV（急速投与で無呼吸になる→ゆっくり投与）",caution:"★呼吸抑制（急速投与で無呼吸になる）。血圧低下（血管拡張・心筋抑制による）。徐脈。覚醒時の興奮、パドリング（四肢をバタバタと動かす運動）。",dog:"◎",cat2:"◎ 猫での長時間投与は注意"},
{name:"ケタミン",gen:"ケタミン",cat:"麻酔・鎮静",tags:["解離性麻酔薬"],scenes:["手術"],action:"NMDA受容体拮抗薬。鎮静・鎮痛・筋弛緩。心拍・血圧を維持しやすい。",disease:"麻酔補助、難治性疼痛のCRI",dose:"IM / IV / CRI",caution:"筋緊張増加（単独使用は避ける、ベンゾジアゼピンと組み合わせることが多い）。過剰投与で興奮。",dog:"◎",cat2:"◎ 猫の導入によく使用"},
{name:"エフェドリン",gen:"塩酸エフェドリン",cat:"麻酔・鎮静",tags:["交感神経刺激薬","低血圧改善"],scenes:["手術"],action:"交感神経刺激薬→心拍数・心収縮力・血管収縮→血圧上昇。効果は投与後1〜2分で現れ、持続は10〜20分。",disease:"麻酔中の低血圧改善",dose:"IV（必要時）",caution:"★頻脈・不整脈。投与後はHRとMAP変化を麻酔カルテに書く。投与しても血圧が上がらない場合は他の要因を考える（循環血液量不足→輸液増加、麻酔深度深すぎ→イソフルランを0.2〜0.5%下げる、心機能低下）。",dog:"◎",cat2:"◎"},
{name:"ミダゾラム",gen:"ミダゾラム",cat:"麻酔・鎮静",tags:["ベンゾジアゼピン","前投与"],scenes:["手術"],action:"GABA受容体増強→鎮静・抗不安・抗けいれん・筋弛緩。",disease:"麻酔前投与、てんかん発作時の鎮静",dose:"IV / IM / 鼻腔内",caution:"過鎮静・呼吸抑制。特に高齢・衰弱した患者では注意。",dog:"◎",cat2:"◎"},
{name:"ピモベンダン（ベトメディン / ピモベハート）",gen:"ピモベンダン",cat:"循環器",tags:["強心薬","血管拡張薬"],scenes:["外来","入院"],action:"心筋のカルシウム感受性を高めて心収縮力を増強＋血管拡張作用。",disease:"僧帽弁閉鎖不全症（MVD）、拡張型心筋症（DCM）",dose:"2.5mg・5mg PO BID（食前30分）",caution:"心拍数の変化に注意。",dog:"◎ 心疾患の主力薬",cat2:"△ 使用例あり"},
{name:"フロセミド（ラシックス）",gen:"フロセミド",cat:"循環器",tags:["ループ利尿薬"],scenes:["外来","入院","緊急"],action:"ループ利尿薬。腎尿細管でのNa・Cl再吸収を阻害して強力に利尿。",disease:"うっ血性心不全（肺水腫）、胸水・腹水、浮腫",dose:"10mg・20mg・40mg PO / IV",caution:"★低カリウム血症、脱水、腎機能悪化に注意。電解質モニタリング必須。多尿・多飲に注意。",dog:"◎",cat2:"◎"},
{name:"アムロジピン（ノルバスク / アピナック）",gen:"アムロジピン",cat:"循環器",tags:["カルシウム拮抗薬","降圧薬"],scenes:["外来"],action:"血管平滑筋のカルシウムチャンネルを遮断→血管拡張→降圧。",disease:"高血圧症（特に猫の慢性腎臓病に伴う高血圧）",dose:"PO",caution:"低血圧、頻脈",dog:"◎",cat2:"◎ 猫の高血圧に第一選択"},
{name:"スピロノラクトン（アルダクトン）",gen:"スピロノラクトン",cat:"循環器",tags:["カリウム保持性利尿薬","抗アルドステロン薬"],scenes:["外来"],action:"アルドステロン拮抗薬。心臓保護作用あり。利尿薬だがカリウムを保持する。",disease:"心不全（フロセミドとの併用）、腹水",dose:"PO",caution:"高カリウム血症（ACE阻害薬との併用時注意）",dog:"◎",cat2:"◎"},

function loadStock() {

var CATS = ['すべて'];

var AC = 'すべて';

function buildTabs() {
  var c = document.getElementById('cats');
  c.innerHTML = '';
  CATS.forEach(function(cat) {
    var b = document.createElement('div');
    b.className = 'cat' + (cat === AC ? ' on' : '');
    b.textContent = cat;
    b.addEventListener('click', function(){ AC = cat; buildTabs(); renderList(); });
    c.appendChild(b);
  });
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  var q = (document.getElementById('q').value || '').trim().toLowerCase();

    return q.split(/\s+/).every(function(w){ return h.indexOf(w) >= 0; });

  var m = document.getElementById('main');

  if (!list.length) {
    m.innerHTML = '<div class="nor">🔍<br>該当する薬剤が見つかりませんでした</div>';
    return;
  }

  // グループ化
  var grp = {}, ord = [];
  list.forEach(function(d) {
    if (!grp[d.cat]) { grp[d.cat] = []; ord.push(d.cat); }
    grp[d.cat].push(d);
  });

  var frag = document.createDocumentFragment();

  // 抗がん剤タブの注意バナー
  if (AC === '抗がん剤') {
    var note = document.createElement('div');
    note.className = 'onco-note';
    note.innerHTML = '⚠️ <strong>取り扱い注意</strong>：調製・投与時は手袋・マスク着用。血管外漏出に即対応できる体制で投与。投与後48時間は排泄物（尿・便）も注意して扱うこと。';
    frag.appendChild(note);
  }

  ord.forEach(function(cat) {
    var sec = document.createElement('div');
    sec.className = 'sec';
    sec.textContent = cat;
    frag.appendChild(sec);

    grp[cat].forEach(function(d) {
      var isOnco = (d.cat === '抗がん剤');
      var stockKey = d.name;
      var savedLoc = stock[stockKey] || '';

      // カード
      var card = document.createElement('div');
      card.className = 'card' + (isOnco ? ' onco' : '');

      // シーンタグ
      var pills = '';
      (d.scenes||[]).forEach(function(s){ pills += '<span class="p ps">' + escHtml(s) + '</span>'; });
      var tc = isOnco ? 'po' : 'pt';
      (d.tags||[]).slice(0,2).forEach(function(t){ pills += '<span class="p ' + tc + '">' + escHtml(t) + '</span>'; });

      // 注意文★ハイライト
      var chtml = escHtml(d.caution||'').replace(/★([^\n]+)/g, '<span class="w">★$1</span>');

      // 詳細本文
      var body = '';
      if (d.action)  body += '<div class="ir"><span class="lb la">作用</span><span class="ic">'  + escHtml(d.action)  + '</span></div>';
      if (d.disease) body += '<div class="ir"><span class="lb ld">疾患</span><span class="ic">'  + escHtml(d.disease) + '</span></div>';
      if (d.dose)    body += '<div class="ir"><span class="lb lo">用量</span><span class="ic">'  + escHtml(d.dose)    + '</span></div>';
      if (d.caution) body += '<div class="ir"><span class="lb lc">注意</span><span class="ic">'  + chtml              + '</span></div>';
      if (d.dog || d.cat2) body += '<div class="spr"><span class="sp spd">🐶 ' + escHtml(d.dog||'−') + '</span><span class="sp spc">🐱 ' + escHtml(d.cat2||'−') + '</span></div>';

      // 在庫場所
      var sid = 'si_' + Math.random().toString(36).slice(2);
      var sdid = 'sd_' + Math.random().toString(36).slice(2);
      body += '<div class="stock-row">'
            + '<span class="lb lk">在庫場所</span>'
            + '<input class="stock-input" id="' + sid + '" type="text" placeholder="例：処置室 棚A-2" value="' + escHtml(savedLoc) + '">'
            + '<button class="stock-save" onclick="saveLocation(\'' + stockKey.replace(/'/g,"\\'") + '\',\'' + sid + '\',\'' + sdid + '\')">保存</button>'
            + '</div>'
            + '<div class="stock-saved" id="' + sdid + '">✓ 保存しました</div>';

      card.innerHTML =
        '<div class="ch">'
        + '<div class="cl">'
        +   '<div class="dn">' + escHtml(d.name) + '</div>'
        +   '<div class="dg">' + escHtml(d.gen)  + '</div>'
        +   '<div class="pr">' + pills + '</div>'
        + '</div>'
        + '<span class="cv">▼</span>'
        + '</div>'
        + '<div class="cb">' + body + '</div>';

      card.querySelector('.ch').addEventListener('click', function(){
        card.classList.toggle('open');
      });
      frag.appendChild(card);
    });
  });

  m.innerHTML = '';
  m.appendChild(frag);
}

function saveLocation(drugName, inputId, msgId) {
  var input = document.getElementById(inputId);
  var msg   = document.getElementById(msgId);
  if (!input) return;
  var stock = loadStock();
  stock[drugName] = input.value;
  saveStock(stock);
  if (msg) {
    msg.style.display = 'block';
    setTimeout(function(){ msg.style.display = 'none'; }, 2000);
  }
}

// 検索
document.getElementById('q').addEventListener('input', renderList);

buildTabs();
renderList();
</script>
</body>
</html>
