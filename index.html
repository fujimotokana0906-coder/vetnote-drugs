<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>薬劑メモ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f7f8fb}
body{font-family:-apple-system,'Hiragino Sans',sans-serif;color:#1a1a2e;font-size:15px;-webkit-text-size-adjust:100%}

#hdr{background:#fff;padding:14px 16px 0;position:-webkit-sticky;position:sticky;top:0;z-index:200;box-shadow:0 1px 0 #ececf2,0 4px 12px rgba(20,20,40,.04);border-bottom:1px solid #eceef4}
.htop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.htop h1{font-size:16px;font-weight:700;color:#1a1a2e}
.htop small{font-size:11px;font-weight:400;color:#9aa1ba;margin-left:7px}
#cnt{font-size:11px;color:#9aa1ba;flex-shrink:0}
.sbox{position:relative;margin-bottom:10px}
.sbox input{-webkit-appearance:none;appearance:none;width:100%;padding:10px 12px 10px 36px;background:#f3f4f9;border:1.5px solid #e7e9f2;border-radius:10px;color:#1a1a2e;font-size:14px;outline:none}
.sbox input::placeholder{color:#b3b7c9}
.sbox input:focus{background:#fff;border-color:#5b8dee}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:#b3b7c9;pointer-events:none}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 14px 7px;font-size:12px;font-weight:500;color:#9aa1ba;border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
.tab.on{color:#1a1a2e;border-bottom-color:#5b8dee}

#main{padding:10px 12px 60px}
.sec{font-size:10px;font-weight:700;color:#9aa1ba;letter-spacing:.12em;text-transform:uppercase;margin:20px 0 7px 2px}

.card{background:#fff;border-radius:12px;border:1px solid #ececf2;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(20,20,40,.03)}
.card.onco{border-left:3.5px solid #d94f4f}
.card.edited{border-left:3.5px solid #5b8dee}
.ch{display:flex;align-items:flex-start;justify-content:space-between;padding:13px 14px;cursor:pointer;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
.cl{flex:1;min-width:0;padding-right:8px}
.dn{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:3px;line-height:1.35;display:flex;align-items:center;gap:6px}
.dn .edot{width:7px;height:7px;border-radius:50%;background:#5b8dee;flex-shrink:0}
.dg{font-size:11px;color:#9aa1ba;margin-bottom:6px;line-height:1.4}
.pr{display:flex;flex-wrap:wrap;gap:4px}
.p{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.ps{background:#eaf1ff;color:#3568d4}
.pt{background:#f1f2f7;color:#73798f}
.po{background:#fdedee;color:#cc3344}
.cv{font-size:12px;color:#c7cad9;flex-shrink:0;margin-top:4px;transition:transform .2s}
.card.open .cv{transform:rotate(180deg)}
.cb{display:none;padding:0 14px 14px;border-top:1px solid #f1f2f7}
.card.open .cb{display:block}

.ir{display:flex;gap:8px;margin-top:10px;align-items:flex-start}
.lb{font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.la{background:#eaf1ff;color:#3568d4}
.ld{background:#e9f8f1;color:#1f8a5a}
.lo{background:#fff6e3;color:#b3800a}
.lc{background:#fdecec;color:#d22e2e}
.lk{background:#f2eefc;color:#6840c4}
.ic{font-size:13px;color:#3d4257;line-height:1.7;flex:1;white-space:pre-wrap}
.w{color:#d22e2e;font-weight:700}
.spr{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.sp{padding:4px 11px;border-radius:7px;font-size:12px;font-weight:600}
.spd{background:#eaf1ff;color:#2147a8}
.spc{background:#fdeef6;color:#a8195f}

.strow{display:flex;gap:8px;margin-top:11px;align-items:center}
.stin{flex:1;padding:8px 10px;border:1.5px solid #e7e9f2;border-radius:8px;font-size:13px;color:#1a1a2e;background:#f7f8fb;outline:none;-webkit-appearance:none;appearance:none;min-width:0}
.stin:focus{border-color:#5b8dee;background:#fff}
.stin::placeholder{color:#b3b7c9}
.stbtn{padding:8px 15px;background:#5b8dee;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.stbtn:active{background:#3a6acc}
.stmsg{font-size:11px;color:#1f8a5a;margin-top:4px;display:none}
.onco-note{background:#fdf3f3;border:1px solid #f6cccc;border-radius:10px;padding:11px 13px;margin:10px 0 4px;font-size:12px;color:#a3393f;line-height:1.65}
.nor{text-align:center;padding:70px 20px;color:#b3b7c9;font-size:14px;line-height:1.8}

.memorow{margin-top:11px}
.memorow .lb{margin-bottom:6px;display:inline-block}
.memota{width:100%;padding:9px 10px;border:1.5px solid #e7e9f2;border-radius:8px;font-size:13px;color:#1a1a2e;background:#f7f8fb;outline:none;-webkit-appearance:none;appearance:none;font-family:inherit;line-height:1.6;resize:vertical;min-height:54px;margin-top:2px}
.memota:focus{border-color:#5b8dee;background:#fff}
.memota::placeholder{color:#b3b7c9}
.memobtnrow{display:flex;justify-content:flex-end;margin-top:6px}

.editbar{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px dashed #ececf2}
.ebtn{flex:1;padding:9px;border:1.5px solid #e7e9f2;border-radius:8px;font-size:13px;font-weight:600;background:#f7f8fb;color:#5a6080;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ebtn:active{background:#ececf2}
.ebtn.danger{color:#d22e2e;border-color:#f6d2d2;background:#fdf6f6}
.eform{display:none;margin-top:12px;padding-top:12px;border-top:1px dashed #ececf2}
.card.editing .eform{display:block}
.card.editing .cb>.ir,.card.editing .cb>.spr,.card.editing .editbar{display:none}
.efield{margin-bottom:10px}
.efield label{display:block;font-size:11px;font-weight:700;color:#9aa1ba;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.efield input,.efield textarea{width:100%;padding:8px 10px;border:1.5px solid #e7e9f2;border-radius:8px;font-size:13px;color:#1a1a2e;background:#f7f8fb;outline:none;font-family:inherit;-webkit-appearance:none;appearance:none}
.efield input:focus,.efield textarea:focus{border-color:#5b8dee;background:#fff}
.efield textarea{resize:vertical;min-height:60px;line-height:1.6}
.erow2{display:flex;gap:8px}
.erow2 .efield{flex:1}
.esave{padding:10px;background:#5b8dee;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:4px;-webkit-tap-highlight-color:transparent}
.esave:active{background:#3a6acc}
.ecancel{padding:10px;background:#f1f2f7;color:#73798f;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:6px;-webkit-tap-highlight-color:transparent}

.topbar-actions{display:flex;justify-content:flex-end;padding:8px 12px 0;background:#f7f8fb}
.resetlink{font-size:11px;color:#9aa1ba;text-decoration:underline;cursor:pointer;-webkit-tap-highlight-color:transparent}
</style>
</head>

<script id="dd" type="text/plain">[{"name": "\u30a2\u30e2\u30ad\u30b7\u30b7\u30ea\u30f3\uff08\u30a2\u30e2\u30ad\u30af\u30ea\u30a2\uff09", "gen": "\u30a2\u30e2\u30ad\u30b7\u30b7\u30ea\u30f3 / \u30af\u30e9\u30d6\u30e9\u30f3\u9178\u914d\u5408", "cat": "\u6297\u83cc\u85ac", "tags": ["\u30da\u30cb\u30b7\u30ea\u30f3\u7cfb", "\u6bba\u83cc\u6027"], "scenes": ["\u5916\u6765", "\u5165\u9662"], "action": "\u7d30\u83cc\u306e\u7d30\u80de\u58c1\u5408\u6210\u3092\u963b\u5bb3\u3057\u3066\u6bba\u83cc\u3002\u03b2-\u30e9\u30af\u30bf\u30de\u30fc\u30bc\u7523\u751f\u83cc\u306b\u3082\u5bfe\u5fdc\u3059\u308b\u305f\u3081\u30af\u30e9\u30d6\u30e9\u30f3\u9178\u3092\u914d\u5408\u3002", "disease": "\u76ae\u819a\u611f\u67d3\u75c7\u3001\u8033\u5185\u611f\u67d3\u75c7\u3001\u5c3f\u8def\u611f\u67d3\u75c7\u3001\u5275\u611f\u67d3\u3001\u8853\u5f8c\u611f\u67d3\u4e88\u9632", "dose": "\u72ac\u732b\uff1a10\u301c20mg/kg BID\uff0fPO \u307e\u305f\u306f SC", "caution": "\u80c3\u8178\u75c7\u72b6\uff08\u5614\u5410\u30fb\u4e0b\u75e2\uff09\u304c\u51fa\u308b\u3053\u3068\u304c\u3042\u308b\u3002\u5c3f\u8def\u611f\u67d3\u75c7\u306e\u7b2c\u4e00\u9078\u629e\u3002", "dog": "\u25ce \u5e45\u5e83\u304f\u4f7f\u7528", "cat2": "\u25ce"}, {"name": "\u30a8\u30f3\u30ed\u30d5\u30ed\u30ad\u30b5\u30b7\u30f3\uff08\u30d0\u30a4\u30c8\u30ea\u30eb\uff09", "gen": "\u30a8\u30f3\u30ed\u30d5\u30ed\u30ad\u30b5\u30b7\u30f3", "cat": "\u6297\u83cc\u85ac", "tags": ["\u30d5\u30eb\u30aa\u30ed\u30ad\u30ce\u30ed\u30f3\u7cfb", "\u6bba\u83cc\u6027"], "scenes": ["\u5916\u6765", "\u5165\u9662"], "action": "\u7d30\u83cc\u306eDNA\u8907\u88fd\u3092\u6b62\u3081\u308b\u3002\u30b0\u30e9\u30e0\u967d\u6027\u30fb\u9670\u6027\u83cc\u3001\u30de\u30a4\u30b3\u30d7\u30e9\u30ba\u30de\u3001\u30ea\u30b1\u30c3\u30c1\u30a2\u3001\u30af\u30e9\u30df\u30b8\u30a2\u3001\u7dd1\u81bf\u83cc\u306b\u6709\u52b9\u3002", "disease": "\u5c3f\u8def\u611f\u67d3\u75c7\u3001\u5916\u8033\u708e\u3001\u547c\u5438\u5668\u611f\u67d3\u75c7\u3001\u6d88\u5316\u7ba1\u611f\u67d3\u75c7\uff08\u91cd\u5ea6   var CATS_ALL = ['\u3059\u3079\u3066'];
  for (var i = 0; i < BASE.length; i++) {
    if (CATS_ALL.indexOf(BASE[i].cat) < 0) CATS_ALL.push(BASE[i].cat);
  }
  var AC = '\u3059\u3079\u3066';

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return esc(s).replace(/\n/g, '&#10;');
  }

  function buildTabs() {
    var el = document.getElementById('tabs');
    el.innerHTML = '';
    for (var i = 0; i < CATS_ALL.length; i++) {
      (function(cat) {
        var b = document.createElement('div');
        b.className = 'tab' + (cat === AC ? ' on' : '');
        b.textContent = cat;
        b.addEventListener('click', function() { AC = cat; buildTabs(); draw(); });
        el.appendChild(b);
      })(CATS_ALL[i]);
    }
  }

  function draw() {
    var D = buildD();
    var q = (document.getElementById('q').value || '').trim().toLowerCase();
    var st = loadSt();
    var memos = loadMemo();

    var list = [];
    for (var i = 0; i < D.length; i++) {
      var d = D[i];
      if (AC !== '\u3059\u3079\u3066' && d.cat !== AC) continue;
      if (q) {
        var hay = [d.name,d.gen,d.cat,d.action||'',d.disease||'',d.caution||'']
                  .concat(d.tags || []).join(' ').toLowerCase();
        var parts = q.split(/\s+/);
        var ok = true;
        for (var j = 0; j < parts.length; j++) {
          if (hay.indexOf(parts[j]) < 0) { ok = false; break; }
        }
        if (!ok) continue;
      }
      list.push(d);
    }

    document.getElementById('cnt').textContent = list.length + '\u4ef6';
    var m = document.getElementById('main');

    if (!list.length) {
      m.innerHTML = '<div class="nor">\u8a72\u5f53\u3059\u308b\u85ac\u5291\u304c<br>\u898b\u3064\u304b\u308a\u307e\u305b\u3093\u3067\u3057\u305f</div>';
      return;
    }

    var grp = {}, ord = [];
    for (var i = 0; i < list.length; i++) {
      var c = list[i].cat;
      if (!grp[c]) { grp[c] = []; ord.push(c); }
      grp[c].push(list[i]);
    }

    var frag = document.createDocumentFragment();

    if (AC === '\u629c\u304c\u3093\u5291') {
      var note = document.createElement('div');
      note.className = 'onco-note';
      note.innerHTML = '\u26a0\ufe0f <strong>\u53d6\u308a\u6271\u3044\u6ce8\u610f</strong>\uff1a\u8abf\u88fd\u30fb\u6295\u4e0e\u6642\u306f\u624b\u888b\u30fb\u30de\u30b9\u30af\u5fc5\u9808\u3002\u8840\u7ba1\u5916\u6f0f\u51fa\u306b\u5373\u5bfe\u5fdc\u3067\u304d\u308b\u4f53\u5236\u3067\u3002\u6295\u4e0e\u5f8c48\u6642\u9593\u306f\u6392\u6ce4\u7269\u306b\u3082\u6ce8\u610f\u3002';
      frag.appendChild(note);
    }

    for (var gi = 0; gi < ord.length; gi++) {
      var cat = ord[gi];
      var sec = document.createElement('div');
      sec.className = 'sec';
      sec.textContent = cat;
      frag.appendChild(sec);

      var items = grp[cat];
      for (var ii = 0; ii < items.length; ii++) {
        var d = items[ii];
        var isOnco = (d.cat === '\u629c\u304c\u3093\u5291');
        var savedLoc = st[d.name] || '';
        var uid = 'u' + gi + '_' + ii;
        var idx = d.__idx;

        var pills = '';
        var sc = d.scenes || [];
        for (var pi = 0; pi < sc.length; pi++) pills += '<span class="p ps">' + esc(sc[pi]) + '</span>';
        var tc = isOnco ? 'po' : 'pt';
        var tg = d.tags || [];
        for (var pi = 0; pi < Math.min(tg.length, 2); pi++) pills += '<span class="p ' + tc + '">' + esc(tg[pi]) + '</span>';

        var chtml = esc(d.caution || '').replace(/\u2605([^\n]+)/g, '<span class="w">\u2605$1</span>');

        var body = '';
        if (d.action)  body += '<div class="ir"><span class="lb la">\u4f5c\u7528</span><span class="ic">' + esc(d.action)  + '</span></div>';
        if (d.disease) body += '<div class="ir"><span class="lb ld">\u75be\u60a3</span><span class="ic">' + esc(d.disease) + '</span></div>';
        if (d.dose)    body += '<div class="ir"><span class="lb lo">\u7528\u91cf</span><span class="ic">' + esc(d.dose)    + '</span></div>';
        if (d.caution) body += '<div class="ir"><span class="lb lc">\u6ce8\u610f</span><span class="ic">' + chtml          + '</span></div>';
        if (d.dog || d.cat2) {
          body += '<div class="spr">'
                + '<span class="sp spd">\ud83d\udc36 ' + esc(d.dog  || '\u2212') + '</span>'
                + '<span class="sp spc">\ud83d\udc31 ' + esc(d.cat2 || '\u2212') + '</span>'
                + '</div>';
        }

        // \u5728\u5eab\u5834\u6240
        body += '<div class="strow">'
              + '<span class="lb lk">\u5728\u5eab\u5834\u6240</span>'
              + '<input class="stin" id="' + uid + '" type="text" placeholder="\u4f8b\uff1a\u51e6\u7f6e\u5ba4 \u68da A-2" value="' + esc(savedLoc) + '">'
              + '<button class="stbtn" data-uid="' + uid + '" data-name="' + esc(d.name) + '">\u4fdd\u5b58</button>'
              + '</div>'
              + '<div class="stmsg" id="msg_' + uid + '">\u2713 \u4fdd\u5b58\u3057\u307e\u3057\u305f</div>';

        // \u30ab\u30c6\u30b4\u30ea\u30a1\u30b3\u30b3\u30a4\u30ad\u30e1\u30e2
        var savedMemo = memos[d.name] || '';
        body += '<div class="memorow">'
              + '<span class="lb lk">\u30e1\u30e2</span>'
              + '<textarea class="memota" id="mm_' + uid + '">' + esc(savedMemo) + '</textarea>'
              + '<div class="memobtnrow"><button class="stbtn" data-uid="' + uid + '" data-act="memosave" data-name="' + esc(d.name) + '">\u30e1\u30e2\u3092\u4fdd\u5b58</button></div>'
              + '</div>'
              + '<div class="stmsg" id="mmsg_' + uid + '">\u2713 \u30e1\u30e2\u3092\u4fdd\u5b58\u3057\u307e\u3057\u305f</div>';

        // \u7de8\u96c6\u30c4\u30fc\u30eb\u30d0\u30fc
        body += '<div class="editbar">'
              + '<button class="ebtn" data-act="edit" data-idx="' + idx + '">\u2710\ufe0f \u7de8\u96c6</button>'
              + '<button class="ebtn danger" data-act="del" data-idx="' + idx + '">\ud83d\uddd1 \u524a\u9664</button>'
              + '</div>';

        // \u7de8\u96c6\u30d5\u30a9\u30fc\u30e0
        body += '<div class="eform" id="ef_' + uid + '">'
              + '<div class="efield"><label>\u85ac\u54c1\u540d</label><input type="text" id="en_' + uid + '" value="' + escAttr(d.name) + '"></div>'
              + '<div class="efield"><label>\u4e00\u822c\u540d/\u6210\u5206</label><input type="text" id="eg_' + uid + '" value="' + escAttr(d.gen) + '"></div>'
              + '<div class="erow2">'
              +   '<div class="efield"><label>\u30ab\u30c6\u30b4\u30ea</label><input type="text" id="ec_' + uid + '" value="' + escAttr(d.cat) + '"></div>'
              + '</div>'
              + '<div class="efield"><label>\u4f5c\u7528</label><textarea id="ea_' + uid + '">' + esc(d.action||'') + '</textarea></div>'
              + '<div class="efield"><label>\u75be\u60a3</label><textarea id="ed_' + uid + '">' + esc(d.disease||'') + '</textarea></div>'
              + '<div class="efield"><label>\u7528\u91cf</label><textarea id="ez_' + uid + '">' + esc(d.dose||'') + '</textarea></div>'
              + '<div class="efield"><label>\u6ce8\u610f\uff08\u2605\u3067\u5f37\u8abf\u8868\u793a\uff09</label><textarea id="ek_' + uid + '">' + esc(d.caution||'') + '</textarea></div>'
              + '<div class="erow2">'
              +   '<div class="efield"><label>\ud83d\udc36 \u72ac\u3078\u306e\u30b3\u30a1\u30e9</label><input type="text" id="edo_' + uid + '" value="' + escAttr(d.dog||'') + '"></div>'
              +   '<div class="efield"><label>\ud83d\udc31 \u732b\u3078\u306e\u30b3\u30a1\u30e9</label><input type="text" id="eca_' + uid + '" value="' + escAttr(d.cat2||'') + '"></div>'
              + '</div>'
              + '<button class="esave" data-act="save" data-idx="' + idx + '">\u4fdd\u5b58\u3059\u308b</button>'
              + '<button class="ecancel" data-act="cancel" data-idx="' + idx + '">\u30ad\u30e3\u30f3\u30bb\u30eb</button>'
              + '</div>';

        var card = document.createElement('div');
        card.className = 'card' + (isOnco ? ' onco' : '') + (d.__edited ? ' edited' : '');
        card.setAttribute('data-idx', idx);
        card.setAttribute('data-uid', uid);
        card.innerHTML =
            '<div class="ch">'
          + '<div class="cl">'
          + '<div class="dn">' + (d.__edited ? '<span class="edot"></span>' : '') + esc(d.name) + '</div>'
          + '<div class="dg">' + esc(d.gen)  + '</div>'
          + '<div class="pr">' + pills + '</div>'
          + '</div><span class="cv">&#9660;</span></div>'
          + '<div class="cb">' + body + '</div>';

        card.querySelector('.ch').addEventListener('click', (function(card) {
          return function() {
            if (card.classList.contains('editing')) return;
            card.classList.toggle('open');
          };
        })(card));

        // \u5728\u5eab\u5834\u6240\u4fdd\u5b58
        card.querySelector('.stbtn').addEventListener('click', (function(uid, name) {
          return function() {
            var inp = document.getElementById(uid);
            var msg = document.getElementById('msg_' + uid);
            if (!inp) return;
            var s = loadSt();
            s[name] = inp.value;
            saveSt(s);
            if (msg) { msg.style.display = 'block'; setTimeout(function() { msg.style.display = 'none'; }, 2000); }
          };
        })(uid, d.name));

        // \u30e1\u30e2\u4fdd\u5b58
        var memoBtn = card.querySelector('[data-act="memosave"]');
        if (memoBtn) {
          memoBtn.addEventListener('click', (function(uid, name) {
            return function() {
              var ta = document.getElementById('mm_' + uid);
              var msg = document.getElementById('mmsg_' + uid);
              if (!ta) return;
              var m = loadMemo();
              m[name] = ta.value;
              saveMemo(m);
              if (msg) { msg.style.display = 'block'; setTimeout(function() { msg.style.display = 'none'; }, 2000); }
            };
          })(uid, d.name));
        }

        // \u7de8\u96c6\u30dc\u30bf\u30f3
        card.querySelector('[data-act="edit"]').addEventListener('click', (function(card, uid) {
          return function(ev) {
            ev.stopPropagation();
            card.classList.add('open', 'editing');
          };
        })(card, uid));

        // \u524a\u9664\u30dc\u30bf\u30f3
        card.querySelector('[data-act="del"]').addEventListener('click', (function(idx, name) {
          return function(ev) {
            ev.stopPropagation();
            if (!confirm('\u300c' + name + '\u300d\u3092\u524a\u9664\u3057\u307e\u3059\u304b\uff1f')) return;
            var edits = loadEdits();
            edits['__' + idx] = { __deleted: true };
            saveEdits(edits);
            draw();
          };
        })(idx, d.name));

        // \u4fdd\u5b58\u30dc\u30bf\u30f3
        var saveBtn = card.querySelector('[data-act="save"]');
        if (saveBtn) {
          saveBtn.addEventListener('click', (function(idx, uid, card) {
            return function(ev) {
              ev.stopPropagation();
              var get = function(p) { return document.getElementById(p + uid).value; };
              var edited = {
                name: get('en_'),
                gen: get('eg_'),
                cat: get('ec_'),
                action: get('ea_'),
                disease: get('ed_'),
                dose: get('ez_'),
                caution: get('ek_'),
                dog: get('edo_'),
                cat2: get('eca_')
              };
              var edits = loadEdits();
              var base = BASE[idx];
              var diff = {};
              for (var k in edited) {
                if (edited[k] !== (base[k] || '')) diff[k] = edited[k];
              }
              if (Object.keys(diff).length === 0) {
                delete edits['__' + idx];
              } else {
                edits['__' + idx] = diff;
              }
              saveEdits(edits);

              // \u30ab\u30c6\u30b4\u30ea\u304c\u5897\u3048\u305f\u5834\u5408\u306e\u5bfe\u5fdc
              if (edited.cat && CATS_ALL.indexOf(edited.cat) < 0) {
                CATS_ALL.push(edited.cat);
              }
              buildTabs();
              draw();
            };
          })(idx, uid, card));
        }

        // \u30ad\u30e3\u30f3\u30bb\u30eb\u30dc\u30bf\u30f3
        var cancelBtn = card.querySelector('[data-act="cancel"]');
        if (cancelBtn) {
          cancelBtn.addEventListener('click', (function(card) {
            return function(ev) {
              ev.stopPropagation();
              card.classList.remove('editing');
            };
          })(card));
        }

        frag.appendChild(card);
      }
    }

    m.innerHTML = '';
    m.appendChild(frag);
  }

  // \u5168\u3066\u306e\u7de8\u96c6\u3092\u30ea\u30bb\u30c3\u30c8
  document.getElementById('resetlink').addEventListener('click', function() {
    if (!confirm('\u3059\u3079\u3066\u306e\u7de8\u96c6\u5185\u5bb9\u3092\u5143\u306b\u623b\u3057\u307e\u3059\u304b\uff1f\uff08\u524a\u9664\u3057\u305f\u85ac\u5291\u3082\u5fa9\u5143\u3057\u307e\u3059\uff09')) return;
    try { localStorage.removeItem(EK); } catch(e) {}
    try { sessionStorage.removeItem(EK); } catch(e) {}
    CATS_ALL = ['\u3059\u3079\u3066'];
    for (var i = 0; i < BASE.length; i++) {
      if (CATS_ALL.indexOf(BASE[i].cat) < 0) CATS_ALL.push(BASE[i].cat);
    }
    AC = '\u3059\u3079\u3066';
    buildTabs();
    draw();
  });

  document.getElementById('q').addEventListener('input', function() {
    var q = (document.getElementById('q').value || '').trim();
    if (q && AC !== '\u3059\u3079\u3066') {
      AC = '\u3059\u3079\u3066';
      buildTabs();
    }
    draw();
  });
  buildTabs();
  draw();
});

</script>
</body>
</html>
